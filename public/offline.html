<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Revenue</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #06b6d4 0%, #f472b6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      max-width: 400px;
      text-align: center;
    }
    
    h1 {
      color: #0f172a;
      margin: 0 0 10px 0;
      font-size: 28px;
    }
    
    p {
      color: #475569;
      margin: 10px 0 30px 0;
      line-height: 1.6;
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    button {
      background: linear-gradient(135deg, #06b6d4 0%, #f472b6 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sem Conexão</h1>
    <p>Você está offline no momento. Tente novamente assim que sua conexão for restaurada.</p>
    <button onclick="location.reload()">Tentar Novamente</button>
  </div>
</body>
</html>
